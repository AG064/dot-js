<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus.js — Build web apps with pleasure</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #0969da;
      --primary-hover: #0860ca;
      --bg: #f6f8fa;
      --text: #1a1a2e;
      --text-muted: #57606a;
      --border: #d0d7de;
      --white: #fff;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    
    /* Buttons */
    .btn-primary {
      background: var(--primary);
      color: var(--white);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    
    .btn-secondary {
      background: #e8ecf0;
      color: var(--text);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: #d0d7de; }
    
    .btn-lg { padding: 14px 28px; font-size: 16px; }
    
    /* Navbar */
    .navbar { padding: 16px 0; }
    .navbar .nav-menu { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      padding: 8px 16px;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .nav-link:hover { background: #e8ecf0; color: var(--primary); }
    .brand { font-weight: 700; font-size: 20px; color: var(--text); text-decoration: none; }
    
    /* Sections */
    .section { padding: 80px 0; }
    .hero { padding: 100px 0 80px; background: linear-gradient(180deg, #fff 0%, var(--bg) 100%); }
    
    /* Forms */
    label { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; min-height: 120px; }
    
    /* Footer */
    .footer { padding: 40px 0; background: var(--white); }
    .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; }
    .footer-links a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/landing.ts"></script>
</body>
</html>
